<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head}">
</head>
<body>
<header th:replace="~{fragmentos :: header}">
</header>

<div class="container mt-5">
    <div class="mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/producto/listado}">Volver</a>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 th:text="${modoEdicion} ? 'Editar Producto' : 'Registrar Producto'">Registrar Producto</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/producto/guardar}" th:object="${producto}" method="post">
                        <input type="hidden" th:field="*{idProducto}">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripcion</label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{precio}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Existencias</label>
                            <input type="number" min="0" class="form-control" th:field="*{existencias}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Imagen por link</label>
                            <input type="url" class="form-control" th:field="*{imagenUrl}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Categoria</label>
                            <select class="form-select" th:field="*{categoria.idCategoria}" required>
                                <option value="">Seleccione una categoria</option>
                                <option th:each="categoria : ${categorias}"
                                        th:value="${categoria.idCategoria}"
                                        th:text="${categoria.nombre}"></option>
                            </select>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Guardar Producto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
