<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>
        <div>
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Inicio</a>
            <a class="btn btn-primary btn-sm"
               th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}"
               th:href="@{/producto/nuevo}">Nuevo producto</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center mb-4">Catalogo de Productos</h2>
    <p class="text-center">Total: <strong th:text="${totalProductos}"></strong></p>

    <div class="card shadow-sm border-0 mb-4">
        <div class="card-body">
            <form class="row g-3 align-items-end" th:action="@{/producto/listado}" method="get">
                <div class="col-md-5">
                    <label class="form-label">Buscar por nombre</label>
                    <input type="text"
                           class="form-control"
                           name="nombre"
                           th:value="${nombreFiltro}"
                           placeholder="Ej. shampoo, cera, microfibra">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Categoria</label>
                    <select class="form-select" name="categoriaId">
                        <option value="">Todas las categorias</option>
                        <option th:each="categoria : ${categorias}"
                                th:value="${categoria.idCategoria}"
                                th:selected="${categoriaFiltro != null and categoria.idCategoria == categoriaFiltro}"
                                th:text="${categoria.nombre}"></option>
                    </select>
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary w-100">Filtrar</button>
                    <a class="btn btn-outline-secondary w-100" th:href="@{/producto/listado}">Limpiar</a>
                </div>
            </form>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-lg-4" th:each="producto : ${productos}">
            <div class="card h-100 shadow-sm">
                <img th:if="${producto.imagenUrl != null and !#strings.isEmpty(producto.imagenUrl)}"
                     th:src="${producto.imagenUrl}"
                     th:alt="${producto.nombre}"
                     class="card-img-top"
                     style="height: 220px; object-fit: cover;">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-start gap-3 mb-2">
                        <h5 class="card-title mb-0" th:text="${producto.nombre}"></h5>
                        <span class="badge text-bg-dark" th:text="${producto.categoria != null ? producto.categoria.nombre : 'Sin categoria'}"></span>
                    </div>
                    <p class="card-text text-muted" th:text="${producto.descripcion}"></p>
                    <p class="mb-2">
                        <strong>Precio:</strong>
                        <span th:text="${#numbers.formatDecimal(producto.precio, 1, 'COMMA', 2, 'POINT')}"></span>
                    </p>
                    <p class="mb-0">
                        <strong>Existencias:</strong>
                        <span th:text="${producto.existencias}"></span>
                    </p>
                    <div th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}"
                         class="d-flex gap-2 mt-3">
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/producto/editar/{id}(id=${producto.idProducto})}">Editar</a>
                        <form th:action="@{/producto/eliminar/{id}(id=${producto.idProducto})}" method="post">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(productos)}" class="alert alert-light border text-center mt-4">
        No se encontraron productos con ese filtro.
    </div>
</div>
</body>
</html>
