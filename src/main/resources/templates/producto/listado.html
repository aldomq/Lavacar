<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" th:href="@{/}">Lavacar</a>

        <div>
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Inicio</a>
            <a class="btn btn-primary btn-sm" th:href="@{/producto/nuevo}">Nuevo producto</a>
        </div>

    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Listado de Productos</h2>

    <p class="text-center">
        Total: <strong th:text="${totalProductos}"></strong>
    </p>

    <table class="table table-bordered table-hover text-center">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Precio</th>
            <th>Existencias</th>
            <th>Categoría</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="producto : ${productos}">
            <td th:text="${producto.idProducto}"></td>
            <td th:text="${producto.nombre}"></td>
            <td th:text="${producto.descripcion}"></td>
            <td th:text="${producto.precio}"></td>
            <td th:text="${producto.existencias}"></td>
            <td th:text="${producto.categoria.nombre}"></td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
