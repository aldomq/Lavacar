<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R - Lavacar</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

    body{
    background-color:#434f6b;
    font-family:Arial, Helvetica, sans-serif;
}

.register-container{
    width:350px;
    text-align:center;
    margin:80px auto;
}

        .register-title{
            background:#3f4b57;
            color:white;
            padding:12px;
            border-radius:8px;
            margin-bottom:20px;
            font-weight:bold;
            letter-spacing:1px;
        }

        .form-control{
            border-radius:20px;
            margin-bottom:10px;
            height:32px;
            font-size:13px;
        }

        .form-check{
            font-size:12px;
            margin-top:5px;
            margin-bottom:15px;
            color:white;
        }

        .btn-signup{
            background:#4aa3df;
            border:none;
            border-radius:25px;
            padding:8px 25px;
            color:white;
            font-weight:bold;
        }

        .btn-signup:hover{
            background:#3793cf;
        }

    </style>

</head>

<body>
    <header th:replace="~{fragmentos :: header}">
</header>
    <div class="register-container">

        <div class="register-title">
            Registro
        </div>

        <form th:action="@{/registro}" method="post">

            <input type="text" class="form-control" placeholder="Nombre" name="firstName" required>

            <input type="text" class="form-control" placeholder="Apellido" name="lastName" required>

            <input type="email" class="form-control" placeholder="Correo eléctonico" name="email" required>

            <input type="text" class="form-control" placeholder="Usuario" name="username" required>

            <input type="password" class="form-control" placeholder="Contraseña" name="password" required>

            <input type="password" class="form-control" placeholder="Repetir la contraseña " name="confirmPassword" required>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" required>
                <label class="form-check-label">
                    Estoy de acuerdo con los términos y condiciones
                </label>
            </div>

            <button type="submit" class="btn btn-signup">
               Registrarse
            </button>

        </form>

    </div>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
