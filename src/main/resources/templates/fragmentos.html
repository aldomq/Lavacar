<head th:fragment="head">
    <title>Lavacar</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<header th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" th:href="@{/}">Lavacar</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Inicio</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                        <a class="nav-link" th:href="@{/producto/listado}">Productos</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/categoria/listado}">Categorias</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/lavados/cola}">Cola de lavado</a>
                    </li>
                    <li class="nav-item" th:if="${session.usuarioLogueado != null}">
                        <a class="nav-link" th:href="@{/lavados/tipos}">Tipos de lavado</a>
                    </li>
                </ul>
            </div>
        </div>

        <div th:if="${session.usuarioLogueado == null}" class="d-flex gap-2 ms-3">
            <a th:href="@{/login}" class="btn btn-light">Iniciar sesion</a>
            <a th:href="@{/registro}" class="btn btn-warning">Registrarse</a>
        </div>

        <div th:if="${session.usuarioLogueado != null}" class="d-flex align-items-center gap-2 me-3">
            <div class="d-flex align-items-center gap-2 px-2 py-1 rounded-3" style="background-color: rgba(255,255,255,0.08);">
                <span style="color: white; font-weight: 600;" th:text="${session.usuarioLogueado.username}"></span>
                <span th:if="${session.usuarioLogueado.rol == 'ADMIN'}"
                      class="badge rounded-pill text-bg-info"
                      th:text="${session.usuarioLogueado.rol}"></span>
            </div>
            <a th:href="@{/logout}" class="btn btn-danger btn-sm">Cerrar sesion</a>
        </div>
    </nav>
</header>

<footer th:fragment="footer" class="bg-dark text-white text-center py-3 mt-4">
    <div class="container">
        <p class="mb-0">Lavacar © 2026 - Proyecto grupo #9</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>

<section th:fragment="mostrarToast">
    <div aria-live="polite" aria-atomic="true" class="position-fixed top-50 start-50 translate-middle" style="z-index:1080;">
        <div th:if="${error}" class="toast show">
            <div class="toast-header text-white bg-danger">Error</div>
            <div class="toast-body">[[${error}]]</div>
        </div>

        <div th:if="${todoOk}" class="toast show">
            <div class="toast-header text-white bg-success">Correcto</div>
            <div class="toast-body">[[${todoOk}]]</div>
        </div>
    </div>
</section>
