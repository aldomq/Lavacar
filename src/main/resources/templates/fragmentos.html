<!-- Fragmento #1 HEAD -->
<head th:fragment="head">
    <title>Lavacar</title>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>

    <link rel="icon" type="image/png" sizes="32x32" href="/fav/favicon-32x32.png"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<!-- Fragmento #2 HEADER -->
<header th:fragment="header">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">

            <a class="navbar-brand fw-bold" th:href="@{/}">
                Lavacar
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuNav">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuNav">

                <ul class="navbar-nav me-auto mb-2 mb-lg-0">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/producto/listado}">
                            Productos
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/categoria/listado}">
                            Categorías
                        </a>
                    </li>

                </ul>

                

            </div>
        </div>
     
<div th:if="${session.usuarioLogueado == null}" class="d-flex gap-2 ms-3" >
    <a th:href="@{/login}" class="btn btn-light">Iniciar sesión</a>
    <a th:href="@{/registro}" class="btn btn-warning">Registrarse</a>
</div>


<div th:if="${session.usuarioLogueado != null}" class="d-flex align-items-center gap-2">


    <span style="color: white; font-weight: bold;"
          th:text="${session.usuarioLogueado.username}">
    </span>

  
    <a th:if="${session.usuarioLogueado.rol == 'ADMIN'}"
       th:href="@{/admin}"
       class="btn btn-warning">
       Admin
    </a>

   
    <a th:href="@{/logout}" class="btn btn-danger">
        Cerrar sesión
    </a>

</div>
    </nav>

</header>



<!-- Fragmento #3 FOOTER -->
<footer th:fragment="footer"
        class="bg-dark text-white text-center py-3 mt-4">

    <div class="container">
        <p class="mb-0">
            Lavacar © 2026 - Proyecto grupo #9
        </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</footer>



<!-- Fragmento Toast (lo dejé igual que el original) -->
<section th:fragment="mostrarToast">

    <div aria-live="polite"
         aria-atomic="true"
         class="position-fixed top-50 start-50 translate-middle"
         style="z-index:1080;">

        <div th:if="${error}" class="toast show">
            <div class="toast-header text-white bg-danger">
                Error
            </div>

            <div class="toast-body">
                [[${error}]]
            </div>
        </div>

        <div th:if="${todoOk}" class="toast show">
            <div class="toast-header text-white bg-success">
                Correcto
            </div>

            <div class="toast-body">
                [[${todoOk}]]
            </div>
        </div>

    </div>

</section>
