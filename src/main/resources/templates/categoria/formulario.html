<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Categoria de Producto' : 'Nueva Categoria de Producto'">Nueva Categoria de Producto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/categoria/listado}">Volver</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 th:text="${modoEdicion} ? 'Editar Categoria de Producto' : 'Registrar Categoria de Producto'">Registrar Categoria de Producto</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                        <input type="hidden" th:field="*{idCategoria}">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripcion</label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}" required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Guardar Categoria</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
