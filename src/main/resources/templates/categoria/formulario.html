<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head}">
</head>
<body>
<header th:replace="~{fragmentos :: header}">
</header>

<div class="container mt-5">
    <div class="mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/categoria/listado}">Volver</a>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 th:text="${modoEdicion} ? 'Editar Categoria de Producto' : 'Registrar Categoria de Producto'">Registrar Categoria de Producto</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/categoria/guardar}" th:object="${categoria}" method="post">
                        <input type="hidden" th:field="*{idCategoria}">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripcion</label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}" required></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Guardar Categoria</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
