<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>

        <div>
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Inicio</a>
            <a class="btn btn-primary btn-sm" th:href="@{/categoria/nueva}">Nueva categoría</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Listado de Categorías</h2>

    <p class="text-center">
        Total: <strong th:text="${totalCategorias}"></strong>
    </p>

    <table class="table table-bordered table-hover text-center">

        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripción</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.idCategoria}"></td>
            <td th:text="${categoria.nombre}"></td>
            <td th:text="${categoria.descripcion}"></td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
