<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head}">
</head>
<body>
<header th:replace="~{fragmentos :: header}">
</header>

<div class="container mt-4">
    <div class="d-flex justify-content-end mb-3" th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">
        <a class="btn btn-primary btn-sm" th:href="@{/categoria/nueva}">Nueva categoria</a>
    </div>
    <h2 class="text-center mb-4">Listado de Categorias de Productos</h2>
    <p class="text-center">Total: <strong th:text="${totalCategorias}"></strong></p>

    <table class="table table-bordered table-hover text-center">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="categoria : ${categorias}">
            <td th:text="${categoria.idCategoria}"></td>
            <td th:text="${categoria.nombre}"></td>
            <td th:text="${categoria.descripcion}"></td>
            <td th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}">
                <div class="d-flex justify-content-center gap-2">
                    <a class="btn btn-outline-primary btn-sm"
                       th:href="@{/categoria/editar/{id}(id=${categoria.idCategoria})}">Editar</a>
                    <form th:action="@{/categoria/eliminar/{id}(id=${categoria.idCategoria})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
