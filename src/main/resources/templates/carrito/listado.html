<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head}">
</head>
<body>
<header th:replace="~{fragmentos :: header}">
</header>

<div class="container py-4">
    <div class="d-flex justify-content-end mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/producto/listado}">Seguir comprando</a>
    </div>
    <h2 class="text-center mb-4">Carrito de compras</h2>

    <div th:if="${compraExitosa}" class="alert alert-success text-center">
        Compra simulada realizada correctamente.
    </div>

    <div class="row g-4">
        <div class="col-lg-9">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-dark text-white">
                    Productos agregados
                </div>

                <div th:if="${#lists.isEmpty(carrito)}" class="card-body">
                    <div class="alert alert-light border text-center mb-0">
                        Tu carrito esta vacio.
                    </div>
                </div>

                <div th:if="${!#lists.isEmpty(carrito)}" class="table-responsive">
                    <table class="table table-striped align-middle mb-0">
                        <thead>
                        <tr>
                            <th>#</th>
                            <th>Producto</th>
                            <th>Precio</th>
                            <th>Cantidad</th>
                            <th>Total</th>
                            <th></th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="item : ${carrito}">
                            <td th:text="${item.productoId}"></td>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img th:if="${item.imagenUrl != null and !#strings.isEmpty(item.imagenUrl)}"
                                         th:src="${item.imagenUrl}"
                                         th:alt="${item.nombre}"
                                         style="width: 64px; height: 64px; object-fit: cover; border-radius: 12px;">
                                    <span th:text="${item.nombre}"></span>
                                </div>
                            </td>
                            <td th:text="${#numbers.formatDecimal(item.precio, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td class="text-center" th:text="${item.cantidad}"></td>
                            <td th:text="${#numbers.formatDecimal(item.subtotal, 1, 'COMMA', 2, 'POINT')}"></td>
                            <td>
                                <form th:action="@{/carrito/eliminar/{id}(id=${item.productoId})}" method="post">
                                    <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                                </form>
                            </td>
                            <td>
                                <a class="btn btn-outline-warning btn-sm"
                                   th:href="@{/carrito/modificar/{id}(id=${item.productoId})}">Modificar</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-lg-3">
            <div class="card text-center bg-primary text-white mb-3 shadow-sm border-0">
                <div class="card-body">
                    <h4>Total del carrito</h4>
                    <h5 th:text="${#numbers.formatDecimal(totalCarrito, 1, 'COMMA', 2, 'POINT')}"></h5>
                </div>
            </div>

            <div class="card text-center bg-success text-white mb-3 shadow-sm border-0">
                <div class="card-body">
                    <a th:href="@{/producto/listado}" class="btn btn-success w-100">Seguir comprando</a>
                </div>
            </div>

            <div class="card text-center bg-info text-white shadow-sm border-0" th:if="${!#lists.isEmpty(carrito)}">
                <div class="card-body">
                    <a th:href="@{/carrito/checkout}" class="btn btn-info w-100">Facturar compra</a>
                </div>
            </div>
        </div>
    </div>
</div>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
