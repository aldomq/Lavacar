<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragmentos :: head}"></head>

<style>

.login-section{
    min-height:90vh;
    background:#495370;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-box{
    width:350px;
    text-align:center;
}

.user-icon{
    width:80px;
    margin-bottom:15px;
}

.input-pill{
    border-radius:30px;
}

.btn-pill{
    border-radius:30px;
}

</style>

<body>

<header th:replace="~{fragmentos :: header}"></header>

<section class="login-section">

    <div class="login-box">

        <img src="https://cdn-icons-png.flaticon.com/512/847/847969.png"
             class="user-icon">

        <h5 class="text-white mb-4">USER</h5>

        <form th:action="@{/login}" method="post">

            <div class="mb-3 text-start">
                <label class="form-label text-white">Username *</label>

                <input type="text"
                       name="username"
                       class="form-control input-pill"
                       placeholder="Enter your Username">
            </div>

            <div class="mb-3 text-start">
                <label class="form-label text-white">Password *</label>

                <input type="password"
                       name="password"
                       class="form-control input-pill"
                       placeholder="Enter your Password">
            </div>

            <div class="d-flex justify-content-between mb-3 small">

               

                <a href="#" class="text-white">
                    Forgot Password?
                </a>

            </div>

            <button type="submit"
                    class="btn btn-dark w-100 btn-pill mb-3">
                LOGIN
            </button>
<p th:if="${error}" th:text="${error}" style="color:red;"></p>
            <a th:href="@{/registro}"
               class="btn btn-primary w-100 btn-pill mb-3">
                REGISTER
            </a>

           <a th:if="${session.usuarioLogueado != null and session.usuarioLogueado.rol == 'ADMIN'}"
   th:href="@{/admin}"
   class="btn btn-light w-100 btn-pill">
    Admin
</a>

        </form>

    </div>

</section>

<footer th:replace="~{fragmentos :: footer}"></footer>

</body>
</html>
