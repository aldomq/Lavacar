<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tipos de Lavado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>
        <div>
            <a class="btn btn-outline-light btn-sm" th:href="@{/}">Inicio</a>
            <a class="btn btn-primary btn-sm" th:if="${esAdmin}" th:href="@{/lavados/tipos/nuevo}">Nuevo tipo</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center mb-4">Tipos de Lavado</h2>
    <p class="text-center">Total: <strong th:text="${totalTipos}"></strong></p>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Descripcion</th>
            <th>Precio</th>
            <th>Duracion</th>
            <th>Estado</th>
            <th th:if="${esAdmin}">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="tipo : ${tiposLavado}">
            <td th:text="${tipo.idTipoLavado}"></td>
            <td th:text="${tipo.nombre}"></td>
            <td th:text="${tipo.descripcion}"></td>
            <td th:text="${#numbers.formatDecimal(tipo.precio, 1, 'COMMA', 2, 'POINT')}"></td>
            <td><span th:text="${tipo.duracionMinutos}"></span> min</td>
            <td th:text="${tipo.activo ? 'Activo' : 'Inactivo'}"></td>
            <td th:if="${esAdmin}">
                <div class="d-flex gap-2">
                    <a class="btn btn-outline-primary btn-sm"
                       th:href="@{/lavados/tipos/editar/{id}(id=${tipo.idTipoLavado})}">Editar</a>
                    <form th:action="@{/lavados/tipos/eliminar/{id}(id=${tipo.idTipoLavado})}" method="post">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                    </form>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
