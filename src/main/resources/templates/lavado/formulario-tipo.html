<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Tipo de Lavado' : 'Nuevo Tipo de Lavado'">Nuevo Tipo de Lavado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/lavados/tipos}">Volver</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 th:text="${modoEdicion} ? 'Editar Tipo de Lavado' : 'Registrar Tipo de Lavado'">Registrar Tipo de Lavado</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/lavados/tipos/guardar}" th:object="${tipoLavado}" method="post">
                        <input type="hidden" th:field="*{idTipoLavado}">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripcion</label>
                            <textarea class="form-control" rows="3" th:field="*{descripcion}" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Precio</label>
                            <input type="number" step="0.01" min="0" class="form-control" th:field="*{precio}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Duracion estimada (minutos)</label>
                            <input type="number" min="1" class="form-control" th:field="*{duracionMinutos}" required>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" th:field="*{activo}">
                            <label class="form-check-label">Disponible para venta</label>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success">Guardar Tipo</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
