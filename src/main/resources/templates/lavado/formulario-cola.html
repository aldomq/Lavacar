<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${modoEdicion} ? 'Editar Auto en Cola' : 'Registrar Auto en Cola'">Registrar Auto en Cola</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">Lavacar</a>
        <a class="btn btn-outline-light btn-sm" th:href="@{/lavados/cola}">Volver</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4 th:text="${modoEdicion} ? 'Editar Auto en Cola' : 'Registrar Auto en Cola'">Registrar Auto en Cola</h4>
                </div>
                <div class="card-body">
                    <form th:action="@{/lavados/cola/guardar}" th:object="${colaLavado}" method="post">
                        <input type="hidden" th:field="*{idColaLavado}">
                        <div class="mb-3">
                            <label class="form-label">Nombre del cliente</label>
                            <input type="text" class="form-control" th:field="*{clienteNombre}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contacto del cliente</label>
                            <input type="text"
                                   class="form-control"
                                   th:field="*{clienteContacto}"
                                   placeholder="Ej. 8888-9999"
                                   required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Placa</label>
                            <input type="text" class="form-control" th:field="*{placa}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Vehiculo</label>
                            <input type="text" class="form-control" th:field="*{vehiculo}" placeholder="Ej. Toyota Yaris gris" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de lavado</label>
                            <select class="form-select" th:field="*{tipoLavado.idTipoLavado}" required>
                                <option value="">Seleccione un tipo</option>
                                <option th:each="tipo : ${tiposLavado}"
                                        th:value="${tipo.idTipoLavado}"
                                        th:text="${tipo.nombre + ' - ' + #numbers.formatDecimal(tipo.precio, 1, 'COMMA', 2, 'POINT')}"></option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Estado</label>
                            <select class="form-select" th:field="*{estado}">
                                <option value="PENDIENTE">PENDIENTE</option>
                                <option value="EN_PROCESO">EN_PROCESO</option>
                                <option value="TERMINADO">TERMINADO</option>
                                <option value="ENTREGADO">ENTREGADO</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Observaciones</label>
                            <textarea class="form-control" rows="3" th:field="*{observaciones}"></textarea>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-success" th:text="${modoEdicion} ? 'Guardar cambios' : 'Guardar en cola'">Guardar en cola</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
