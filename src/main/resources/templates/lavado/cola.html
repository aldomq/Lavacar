<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragmentos :: head}">
</head>
<body>
<header th:replace="~{fragmentos :: header}">
</header>

<div class="container mt-4">
    <div class="d-flex justify-content-end gap-2 mb-3">
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/lavados/tipos}">Tipos de lavado</a>
        <a class="btn btn-primary btn-sm" th:href="@{/lavados/cola/nuevo}">Registrar auto</a>
    </div>
    <h2 class="text-center mb-4">Cola de Lavado</h2>
    <p class="text-center">Vehiculos en cola: <strong th:text="${totalCola}"></strong></p>

    <table class="table table-bordered table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Contacto</th>
            <th>Placa</th>
            <th>Vehiculo</th>
            <th>Tipo de lavado</th>
            <th>Precio</th>
            <th>Estado</th>
            <th>Cuenta regresiva</th>
            <th>Registro</th>
            <th>Accion</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${colaLavado}">
            <td th:text="${item.idColaLavado}"></td>
            <td th:text="${item.clienteNombre}"></td>
            <td th:text="${item.clienteContacto}"></td>
            <td th:text="${item.placa}"></td>
            <td th:text="${item.vehiculo}"></td>
            <td th:text="${item.tipoLavado != null ? item.tipoLavado.nombre : 'Sin tipo'}"></td>
            <td th:text="${item.tipoLavado != null ? #numbers.formatDecimal(item.tipoLavado.precio, 1, 'COMMA', 2, 'POINT') : '0.00'}"></td>
            <td>
                <span class="badge"
                      th:classappend="${item.estado == 'EN_PROCESO'} ? ' text-bg-warning' : (${item.estado == 'TERMINADO' or item.estado == 'ENTREGADO'} ? ' text-bg-success' : ' text-bg-secondary')"
                      th:text="${item.estado}"></span>
            </td>
            <td>
                <span th:if="${item.finEstimada != null}"
                      class="contador"
                      th:attr="data-fin=${#temporals.format(item.finEstimada, 'yyyy-MM-dd''T''HH:mm:ss')}"
                      th:text="${item.estado == 'EN_PROCESO' ? 'Calculando...' : 'Finalizado'}"></span>
                <span th:if="${item.finEstimada == null}">Sin temporizador</span>
            </td>
            <td th:text="${item.fechaRegistro != null ? #temporals.format(item.fechaRegistro, 'dd/MM/yyyy HH:mm') : ''}"></td>
            <td>
                <div class="d-flex flex-column gap-2">
                    <form th:action="@{/lavados/cola/{id}/estado(id=${item.idColaLavado})}" method="post" class="d-flex gap-2">
                        <select name="estado" class="form-select form-select-sm">
                            <option value="PENDIENTE" th:selected="${item.estado == 'PENDIENTE'}">Pendiente</option>
                            <option value="EN_PROCESO" th:selected="${item.estado == 'EN_PROCESO'}">En proceso</option>
                            <option value="TERMINADO" th:selected="${item.estado == 'TERMINADO'}">Terminado</option>
                            <option value="ENTREGADO" th:selected="${item.estado == 'ENTREGADO'}">Entregado</option>
                        </select>
                        <button type="submit" class="btn btn-sm btn-dark">Estado</button>
                    </form>
                    <div class="d-flex gap-2">
                        <a class="btn btn-outline-primary btn-sm"
                           th:href="@{/lavados/cola/editar/{id}(id=${item.idColaLavado})}">Editar</a>
                        <form th:action="@{/lavados/cola/eliminar/{id}(id=${item.idColaLavado})}" method="post">
                            <button type="submit" class="btn btn-outline-danger btn-sm">Eliminar</button>
                        </form>
                    </div>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    function formatearDuracion(ms) {
        const totalSegundos = Math.max(0, Math.floor(ms / 1000));
        const horas = Math.floor(totalSegundos / 3600);
        const minutos = Math.floor((totalSegundos % 3600) / 60);
        const segundos = totalSegundos % 60;
        return `${horas.toString().padStart(2, '0')}:${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
    }

    function actualizarContadores() {
        document.querySelectorAll('.contador').forEach((elemento) => {
            const fin = elemento.dataset.fin;
            if (!fin) {
                return;
            }

            const diferencia = new Date(fin).getTime() - Date.now();
            if (diferencia <= 0) {
                elemento.textContent = '00:00:00';
                elemento.classList.add('text-danger', 'fw-bold');
            } else {
                elemento.textContent = formatearDuracion(diferencia);
            }
        });
    }

    actualizarContadores();
    setInterval(actualizarContadores, 1000);
</script>
<footer th:replace="~{fragmentos :: footer}">
</footer>
</body>
</html>
